name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate MatchMaker syntax
        run: node --check backend/lambda-matchmaker.mjs

      - name: Validate game-server syntax
        run: node --check backend/game-server/server.js

      - name: Validate config generator
        run: node --check scripts/generate-config.js
